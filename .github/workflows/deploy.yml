name: Deploy mdBook site to Pages

on:
  push:
    branches:
      - main
      - master # Triggers on push to main or master branches
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

# Grant permissions to GITHUB_TOKEN to build and deploy GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress runs of the same workflow to optimize performance
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.4.40" # Change to 'latest' to always use the newest version

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build mdBook to static HTML
        run: mdbook build

      - name: Upload artifact for deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book # Default output directory of mdBook

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
